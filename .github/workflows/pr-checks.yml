name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ===========================================
  # Quick Validation
  # ===========================================
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MehguViewer.sln

      - name: Build
        run: dotnet build MehguViewer.sln --configuration Debug --no-restore

      - name: Run Unit Tests Only
        run: |
          dotnet test Tests/Tests.csproj \
            --configuration Debug \
            --no-restore \
            --filter "Category!=Integration" \
            --logger "console;verbosity=normal"

  # ===========================================
  # PR Size Check
  # ===========================================
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changedFiles = pr.changed_files;
            
            let label = 'size/S';
            let comment = '';
            
            if (additions + deletions > 1000) {
              label = 'size/XL';
              comment = '⚠️ This PR is quite large. Consider breaking it into smaller PRs for easier review.';
            } else if (additions + deletions > 500) {
              label = 'size/L';
            } else if (additions + deletions > 100) {
              label = 'size/M';
            }
            
            // Add label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label]
              });
            } catch (e) {
              console.log('Could not add label:', e.message);
            }
            
            if (comment) {
              console.log(comment);
            }
            
            console.log(`PR Stats: +${additions} -${deletions}, ${changedFiles} files changed`);

  # ===========================================
  # Conventional Commits Check
  # ===========================================
  commits:
    name: Commit Messages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Commit Messages
        uses: webiny/action-conventional-commits@v1.3.0
        with:
          allowed-commit-types: "feat,fix,docs,style,refactor,perf,test,build,ci,chore,revert"
        continue-on-error: true
