name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - 'Dockerfile'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ===========================================
  # Build Job
  # ===========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore MehguViewer.sln

      - name: Build Solution
        run: dotnet build MehguViewer.sln --configuration Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/bin/Release/
            !**/obj/
          retention-days: 1

  # ===========================================
  # Test Job
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore MehguViewer.sln

      - name: Run Tests with Coverage
        run: |
          dotnet test Tests/Tests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        if: success()
        with:
          reports: './TestResults/**/coverage.cobertura.xml'
          targetdir: './CoverageReport'
          reporttypes: 'HtmlInline;Badges;MarkdownSummaryGithub'

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 7

      - name: Add Coverage Summary to PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' && success()
        with:
          recreate: true
          path: CoverageReport/SummaryGithub.md

  # ===========================================
  # Code Quality Job
  # ===========================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore MehguViewer.sln

      - name: Check Formatting
        run: dotnet format MehguViewer.sln --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      - name: Run Security Scan
        run: |
          dotnet tool restore || dotnet tool install --global security-scan --version 5.6.7 || true
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt || true

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: vulnerability-report.txt
          retention-days: 7

  # ===========================================
  # Docker Build Job
  # ===========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ===========================================
  # Release Job
  # ===========================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    strategy:
      matrix:
        include:
          - os: linux
            rid: linux-x64
          - os: windows
            rid: win-x64
          - os: macos
            rid: osx-x64
          - os: macos-arm
            rid: osx-arm64
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install AOT Dependencies (Linux)
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        run: |
          dotnet publish MehguViewer.Core.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -o ./publish/${{ matrix.rid }}

      - name: Create Archive (Unix)
        if: matrix.os != 'windows'
        run: |
          cd ./publish/${{ matrix.rid }}
          tar -czvf ../../MehguViewer.Core-${{ matrix.rid }}.tar.gz .

      - name: Create Archive (Windows)
        if: matrix.os == 'windows'
        run: |
          cd ./publish/${{ matrix.rid }}
          zip -r ../../MehguViewer.Core-${{ matrix.rid }}.zip .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            MehguViewer.Core-${{ matrix.rid }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
