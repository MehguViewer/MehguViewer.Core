name: .NET CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore MehguViewer.Core/MehguViewer.sln
    - name: Build
      run: dotnet build MehguViewer.Core/MehguViewer.sln --no-restore
    - name: Test
      run: dotnet test MehguViewer.Core/MehguViewer.sln --no-build --verbosity normal
