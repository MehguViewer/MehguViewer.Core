name: Build Artifacts

on:
  push:
    branches: [ "main" ]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtimeIdentifier:
          [
            win-x64,
            win-x86,
            linux-x64,
            linux-arm,
            linux-arm64,
            osx-x64,
            osx-arm64
          ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install WASM Tools
        run: dotnet workload install wasm-tools-net9

      - name: Restore Dependencies
        run: dotnet restore MehguViewer.Core.csproj -r browser-wasm

      - name: Determine Version
        id: set_version
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(feat)"
          version_format: "${major}.${minor}.${patch}.${increment}"
          search_commit_body: true
          user_format_type: "csv"

      - name: Build MehguViewer.Core .NET 9.0
        run: dotnet publish MehguViewer.Core.csproj --no-self-contained -p:RuntimeIdentifier=${{ matrix.runtimeIdentifier }} --framework net9.0 /p:Version=${{ steps.set_version.outputs.version }} /p:WasmEnableSIMD=false /p:PublishAot=false

      - name: Upload binary files(${{ matrix.runtimeIdentifier }}) for .NET 9.0
        uses: actions/upload-artifact@v4
        with:
          name: MehguViewer.Core_${{ matrix.runtimeIdentifier }}_${{ steps.set_version.outputs.version }}
          path: bin/Release/net9.0/${{ matrix.runtimeIdentifier }}/publish

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd bin/Release/net9.0/${{ matrix.runtimeIdentifier }}/publish
          # Zip the artifact for release upload
          zip -r MehguViewer.Core_${{ matrix.runtimeIdentifier }}_${{ steps.set_version.outputs.version }}.zip .
          gh release upload ${{ github.event.release.tag_name }} MehguViewer.Core_${{ matrix.runtimeIdentifier }}_${{ steps.set_version.outputs.version }}.zip
