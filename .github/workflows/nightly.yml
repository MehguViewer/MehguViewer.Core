name: Nightly

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ===========================================
  # Full Integration Tests
  # ===========================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: mehgutest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MehguViewer.sln

      - name: Build
        run: dotnet build MehguViewer.sln --configuration Release --no-restore

      - name: Run All Tests
        run: |
          dotnet test Tests/Tests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --collect:"XPlat Code Coverage"
        env:
          TEST_POSTGRES_HOST: localhost
          TEST_POSTGRES_PORT: 5432
          TEST_POSTGRES_USER: testuser
          TEST_POSTGRES_PASSWORD: testpass
          TEST_POSTGRES_DATABASE: mehgutest

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./TestResults
          retention-days: 7

  # ===========================================
  # Multi-Platform Build Test
  # ===========================================
  cross-platform:
    name: Cross-Platform Build
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MehguViewer.sln

      - name: Build
        run: dotnet build MehguViewer.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test Tests/Tests.csproj --configuration Release --no-restore

      - name: Publish
        shell: bash
        run: |
          dotnet publish MehguViewer.Core.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -o ./publish

  # ===========================================
  # Dependency Updates Check
  # ===========================================
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check for Outdated Packages
        run: |
          echo "## Outdated Packages Report" > outdated-report.md
          echo "" >> outdated-report.md
          echo "Generated: $(date -u)" >> outdated-report.md
          echo "" >> outdated-report.md
          echo "### MehguViewer.Core" >> outdated-report.md
          dotnet list MehguViewer.Core.csproj package --outdated >> outdated-report.md 2>&1 || true
          echo "" >> outdated-report.md
          echo "### Tests" >> outdated-report.md
          dotnet list Tests/Tests.csproj package --outdated >> outdated-report.md 2>&1 || true

      - name: Check for Vulnerable Packages
        run: |
          echo "" >> outdated-report.md
          echo "## Vulnerability Report" >> outdated-report.md
          echo "" >> outdated-report.md
          dotnet list package --vulnerable --include-transitive >> outdated-report.md 2>&1 || true

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: outdated-report.md
          retention-days: 30

  # ===========================================
  # Performance Benchmarks (if available)
  # ===========================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MehguViewer.sln

      - name: Build Release
        run: dotnet build MehguViewer.sln --configuration Release --no-restore

      - name: Run Application Health Check
        run: |
          # Start the application in background
          cd MehguViewer.Core
          dotnet run --configuration Release --no-build &
          APP_PID=$!
          
          # Wait for startup
          sleep 10
          
          # Health check
          curl -f http://localhost:5000/.well-known/mehgu-node || echo "Health check endpoint not available on default port"
          
          # Cleanup
          kill $APP_PID 2>/dev/null || true
        continue-on-error: true
